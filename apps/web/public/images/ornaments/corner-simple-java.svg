<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Simple Java: Batik parang + traditional Javanese ornament -->
  <g opacity="0.9">
    <!-- Frame lines -->
    <path d="M8,8 L8,130" stroke="#8b6914" stroke-width="1.5" opacity="0.3"/>
    <path d="M8,8 L130,8" stroke="#8b6914" stroke-width="1.5" opacity="0.3"/>
    <!-- Inner shorter lines -->
    <path d="M16,16 L16,100" stroke="#8b6914" stroke-width="0.8" opacity="0.18"/>
    <path d="M16,16 L100,16" stroke="#8b6914" stroke-width="0.8" opacity="0.18"/>
    <!-- Parang (curving blade) batik motif -->
    <path d="M35,35 Q50,25 55,40 Q60,55 45,60 Q30,55 35,40" stroke="#8b6914" stroke-width="1" fill="#8b6914" fill-opacity="0.08"/>
    <path d="M40,38 Q48,33 50,42 Q52,50 45,52" stroke="#8b6914" stroke-width="0.5" fill="none" opacity="0.2"/>
    <circle cx="45" cy="45" r="2" fill="#8b6914" opacity="0.3"/>
    <!-- Second smaller parang -->
    <path d="M70,22 Q80,16 83,26 Q86,36 76,38 Q66,36 70,26" stroke="#8b6914" stroke-width="0.8" fill="#8b6914" fill-opacity="0.06" opacity="0.6"/>
    <path d="M22,70 Q16,80 26,83 Q36,86 38,76 Q36,66 26,70" stroke="#8b6914" stroke-width="0.8" fill="#8b6914" fill-opacity="0.06" opacity="0.6"/>
    <!-- Corner bracket -->
    <path d="M8,8 L22,8 Q16,14 16,22" stroke="#8b6914" stroke-width="1.2" fill="none" opacity="0.35"/>
    <path d="M8,8 L8,22 Q14,16 22,16" stroke="#8b6914" stroke-width="1.2" fill="none" opacity="0.35"/>
    <!-- Dots pattern along edges (batik style) -->
    <circle cx="50" cy="11" r="1.5" fill="#8b6914" opacity="0.2"/>
    <circle cx="70" cy="11" r="1.5" fill="#8b6914" opacity="0.18"/>
    <circle cx="90" cy="11" r="1.5" fill="#8b6914" opacity="0.15"/>
    <circle cx="110" cy="11" r="1.5" fill="#8b6914" opacity="0.12"/>
    <circle cx="11" cy="50" r="1.5" fill="#8b6914" opacity="0.2"/>
    <circle cx="11" cy="70" r="1.5" fill="#8b6914" opacity="0.18"/>
    <circle cx="11" cy="90" r="1.5" fill="#8b6914" opacity="0.15"/>
    <circle cx="11" cy="110" r="1.5" fill="#8b6914" opacity="0.12"/>
    <!-- Extended vine decoration -->
    <path d="M55,60 Q65,70 60,85 Q58,95 62,105" stroke="#8b6914" stroke-width="0.6" fill="none" opacity="0.15"/>
    <path d="M60,55 Q70,65 85,60 Q95,58 105,62" stroke="#8b6914" stroke-width="0.6" fill="none" opacity="0.15"/>
    <!-- Small leaves -->
    <path d="M62,80 Q68,75 65,83 Z" fill="#8b6914" opacity="0.12"/>
    <path d="M80,62 Q75,68 83,65 Z" fill="#8b6914" opacity="0.12"/>
  </g>
</svg>