<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <!-- Celestial Garden corner ornament — magical vine/fern with glowing accents -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Vine curves -->
  <path d="M2,58 C2,30 8,15 20,8 C28,4 38,2 58,2" fill="none" stroke="#4ecdc4" stroke-width="0.8" opacity="0.35"/>
  <path d="M2,48 C5,28 12,18 25,12 C32,9 40,8 58,8" fill="none" stroke="#4ecdc4" stroke-width="0.5" opacity="0.2"/>
  <!-- Fern leaves -->
  <ellipse cx="12" cy="38" rx="5" ry="2" transform="rotate(-50 12 38)" fill="#4ecdc4" opacity="0.2"/>
  <ellipse cx="20" cy="24" rx="5" ry="2" transform="rotate(-35 20 24)" fill="#4ecdc4" opacity="0.18"/>
  <ellipse cx="32" cy="14" rx="4.5" ry="1.8" transform="rotate(-20 32 14)" fill="#4ecdc4" opacity="0.15"/>
  <ellipse cx="44" cy="8" rx="4" ry="1.5" transform="rotate(-10 44 8)" fill="#4ecdc4" opacity="0.12"/>
  <!-- Glow dots (fireflies) -->
  <circle cx="8" cy="44" r="3" fill="url(#glow)"/>
  <circle cx="18" cy="28" r="2.5" fill="url(#glow)"/>
  <circle cx="30" cy="16" r="2" fill="url(#glow)"/>
  <circle cx="46" cy="6" r="2.5" fill="url(#glow)"/>
  <!-- Tiny sparkle dots -->
  <circle cx="14" cy="34" r="0.8" fill="#a8edea" opacity="0.5"/>
  <circle cx="26" cy="18" r="0.7" fill="#a8edea" opacity="0.4"/>
  <circle cx="40" cy="10" r="0.6" fill="#a8edea" opacity="0.35"/>
</svg>
