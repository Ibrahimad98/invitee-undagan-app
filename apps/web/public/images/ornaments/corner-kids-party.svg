<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Kids Party: Balloons, confetti, stars -->
  <g>
    <!-- Balloon 1 - Red -->
    <ellipse cx="45" cy="50" rx="18" ry="22" fill="#ff6b6b" opacity="0.35"/>
    <path d="M45,72 L42,78 L48,78 Z" fill="#ff6b6b" opacity="0.35"/>
    <path d="M45,78 Q50,95 42,120" stroke="#ff6b6b" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- Balloon 2 - Blue -->
    <ellipse cx="75" cy="35" rx="15" ry="19" fill="#48dbfb" opacity="0.3"/>
    <path d="M75,54 L72,59 L78,59 Z" fill="#48dbfb" opacity="0.3"/>
    <path d="M75,59 Q80,80 72,105" stroke="#48dbfb" stroke-width="0.8" fill="none" opacity="0.25"/>
    <!-- Balloon 3 - Yellow -->
    <ellipse cx="25" cy="70" rx="13" ry="16" fill="#feca57" opacity="0.3"/>
    <path d="M25,86 L23,90 L27,90 Z" fill="#feca57" opacity="0.3"/>
    <path d="M25,90 Q30,110 22,130" stroke="#feca57" stroke-width="0.8" fill="none" opacity="0.25"/>
    <!-- Confetti pieces -->
    <rect x="100" y="20" width="6" height="3" rx="1" fill="#ff6b6b" opacity="0.4" transform="rotate(30 103 21.5)"/>
    <rect x="120" y="40" width="5" height="3" rx="1" fill="#48dbfb" opacity="0.35" transform="rotate(-20 122.5 41.5)"/>
    <rect x="140" y="15" width="6" height="3" rx="1" fill="#feca57" opacity="0.4" transform="rotate(45 143 16.5)"/>
    <rect x="15" y="120" width="5" height="3" rx="1" fill="#ff9ff3" opacity="0.35" transform="rotate(-15 17.5 121.5)"/>
    <rect x="55" y="140" width="6" height="3" rx="1" fill="#54a0ff" opacity="0.3" transform="rotate(60 58 141.5)"/>
    <!-- Stars -->
    <path d="M130,70 l2,5 5,0 -4,3 1.5,5 -4.5-3 -4.5,3 1.5-5 -4-3 5,0z" fill="#feca57" opacity="0.4"/>
    <path d="M160,45 l1.5,3.5 4,0 -3,2.5 1,4 -3.5-2.5 -3.5,2.5 1-4 -3-2.5 4,0z" fill="#ff6b6b" opacity="0.3"/>
    <path d="M90,130 l1.5,3.5 4,0 -3,2.5 1,4 -3.5-2.5 -3.5,2.5 1-4 -3-2.5 4,0z" fill="#54a0ff" opacity="0.3"/>
    <!-- Small dots confetti -->
    <circle cx="110" cy="90" r="2.5" fill="#ff9ff3" opacity="0.3"/>
    <circle cx="150" cy="80" r="2" fill="#5f27cd" opacity="0.25"/>
    <circle cx="60" cy="160" r="2.5" fill="#feca57" opacity="0.3"/>
    <circle cx="130" cy="140" r="2" fill="#48dbfb" opacity="0.25"/>
    <circle cx="170" cy="120" r="3" fill="#ff6b6b" opacity="0.2"/>
    <!-- Ribbon curl -->
    <path d="M45,120 Q55,115 50,130 Q48,140 55,145" stroke="#ff9ff3" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M72,105 Q82,100 78,115 Q75,125 80,132" stroke="#48dbfb" stroke-width="1" fill="none" opacity="0.25"/>
  </g>
</svg>