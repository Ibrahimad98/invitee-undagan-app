<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Wayang Heritage: Batik kawung + wayang silhouette corner -->
  <g opacity="0.9">
    <!-- Decorative frame lines -->
    <path d="M8,8 L8,140" stroke="#8b4513" stroke-width="2" opacity="0.35"/>
    <path d="M8,8 L140,8" stroke="#8b4513" stroke-width="2" opacity="0.35"/>
    <path d="M15,15 L15,120" stroke="#8b4513" stroke-width="1" opacity="0.2"/>
    <path d="M15,15 L120,15" stroke="#8b4513" stroke-width="1" opacity="0.2"/>
    <!-- Kawung batik pattern (oval clusters) -->
    <g opacity="0.3">
      <ellipse cx="45" cy="45" rx="8" ry="5" fill="#8b4513" transform="rotate(45 45 45)"/>
      <ellipse cx="45" cy="45" rx="8" ry="5" fill="#8b4513" transform="rotate(-45 45 45)"/>
      <circle cx="45" cy="45" r="3" fill="#f2e8d5"/>
      <circle cx="45" cy="45" r="1.5" fill="#8b4513" opacity="0.5"/>
    </g>
    <g opacity="0.2">
      <ellipse cx="80" cy="30" rx="6" ry="4" fill="#8b4513" transform="rotate(45 80 30)"/>
      <ellipse cx="80" cy="30" rx="6" ry="4" fill="#8b4513" transform="rotate(-45 80 30)"/>
      <circle cx="80" cy="30" r="2" fill="#f2e8d5"/>
    </g>
    <g opacity="0.2">
      <ellipse cx="30" cy="80" rx="6" ry="4" fill="#8b4513" transform="rotate(45 30 80)"/>
      <ellipse cx="30" cy="80" rx="6" ry="4" fill="#8b4513" transform="rotate(-45 30 80)"/>
      <circle cx="30" cy="80" r="2" fill="#f2e8d5"/>
    </g>
    <!-- Small kawung along edges -->
    <g opacity="0.15">
      <ellipse cx="110" cy="15" rx="4" ry="2.5" fill="#8b4513" transform="rotate(45 110 15)"/>
      <ellipse cx="110" cy="15" rx="4" ry="2.5" fill="#8b4513" transform="rotate(-45 110 15)"/>
    </g>
    <g opacity="0.15">
      <ellipse cx="15" cy="110" rx="4" ry="2.5" fill="#8b4513" transform="rotate(45 15 110)"/>
      <ellipse cx="15" cy="110" rx="4" ry="2.5" fill="#8b4513" transform="rotate(-45 15 110)"/>
    </g>
    <!-- Corner bracket ornament -->
    <path d="M8,8 L25,8 Q20,12 20,20" stroke="#8b4513" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M8,8 L8,25 Q12,20 20,20" stroke="#8b4513" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Wayang shadow decorative element -->
    <path d="M55,65 Q60,55 70,60 Q65,65 70,75 Q60,70 55,75 Q58,68 55,65" fill="#8b4513" opacity="0.12"/>
    <!-- Batik dots along line -->
    <circle cx="60" cy="12" r="1.5" fill="#8b4513" opacity="0.25"/>
    <circle cx="95" cy="12" r="1.5" fill="#8b4513" opacity="0.2"/>
    <circle cx="12" cy="60" r="1.5" fill="#8b4513" opacity="0.25"/>
    <circle cx="12" cy="95" r="1.5" fill="#8b4513" opacity="0.2"/>
  </g>
</svg>