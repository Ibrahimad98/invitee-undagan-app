<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <!-- Royal Blossom watercolor-style top-left corner — soft rose/burgundy/gold -->
  <defs>
    <radialGradient id="rb-wc1" cx="0.3" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#d4a373" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#c4856a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b3a4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rb-wc2" cx="0.5" cy="0.4" r="0.45">
      <stop offset="0%" stop-color="#e6c9a8" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d4a373" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5e3c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rb-wc3" cx="0.4" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#c47a8a" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#a05a6a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6b2a3a" stop-opacity="0"/>
    </radialGradient>
    <filter id="rb-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="rb-blur-sm">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Large watercolor wash blobs -->
  <ellipse cx="80" cy="80" rx="120" ry="100" fill="url(#rb-wc1)" filter="url(#rb-blur)" opacity="0.7"/>
  <ellipse cx="140" cy="60" rx="90" ry="70" fill="url(#rb-wc2)" filter="url(#rb-blur)" opacity="0.5"/>
  <ellipse cx="60" cy="130" rx="80" ry="60" fill="url(#rb-wc3)" filter="url(#rb-blur)" opacity="0.5"/>

  <!-- Smaller accent blooms -->
  <ellipse cx="170" cy="110" rx="55" ry="45" fill="url(#rb-wc2)" filter="url(#rb-blur-sm)" opacity="0.35"/>
  <ellipse cx="110" cy="170" rx="50" ry="40" fill="url(#rb-wc1)" filter="url(#rb-blur-sm)" opacity="0.3"/>

  <!-- Stylized rose petals -->
  <g transform="translate(75,65)" opacity="0.5">
    <ellipse rx="28" ry="12" transform="rotate(0)" fill="#d4a373" filter="url(#rb-blur-sm)" opacity="0.5"/>
    <ellipse rx="28" ry="12" transform="rotate(72)" fill="#c47a8a" filter="url(#rb-blur-sm)" opacity="0.4"/>
    <ellipse rx="28" ry="12" transform="rotate(144)" fill="#d4a373" filter="url(#rb-blur-sm)" opacity="0.45"/>
    <ellipse rx="28" ry="12" transform="rotate(216)" fill="#c47a8a" filter="url(#rb-blur-sm)" opacity="0.35"/>
    <ellipse rx="28" ry="12" transform="rotate(288)" fill="#d4a373" filter="url(#rb-blur-sm)" opacity="0.4"/>
    <circle r="8" fill="#e6c9a8" filter="url(#rb-blur-sm)" opacity="0.5"/>
  </g>

  <!-- Secondary rose -->
  <g transform="translate(150,100)" opacity="0.35">
    <ellipse rx="20" ry="8" transform="rotate(15)" fill="#d4a373" filter="url(#rb-blur-sm)" opacity="0.5"/>
    <ellipse rx="20" ry="8" transform="rotate(87)" fill="#c47a8a" filter="url(#rb-blur-sm)" opacity="0.4"/>
    <ellipse rx="20" ry="8" transform="rotate(159)" fill="#d4a373" filter="url(#rb-blur-sm)" opacity="0.45"/>
    <ellipse rx="20" ry="8" transform="rotate(231)" fill="#c47a8a" filter="url(#rb-blur-sm)" opacity="0.35"/>
    <ellipse rx="20" ry="8" transform="rotate(303)" fill="#d4a373" filter="url(#rb-blur-sm)" opacity="0.4"/>
    <circle r="5" fill="#e6c9a8" filter="url(#rb-blur-sm)" opacity="0.5"/>
  </g>

  <!-- Small bud -->
  <g transform="translate(50,155)" opacity="0.3">
    <ellipse rx="14" ry="6" transform="rotate(30)" fill="#c47a8a" filter="url(#rb-blur-sm)" opacity="0.5"/>
    <ellipse rx="14" ry="6" transform="rotate(110)" fill="#d4a373" filter="url(#rb-blur-sm)" opacity="0.45"/>
    <ellipse rx="14" ry="6" transform="rotate(190)" fill="#c47a8a" filter="url(#rb-blur-sm)" opacity="0.4"/>
    <circle r="4" fill="#e6c9a8" filter="url(#rb-blur-sm)" opacity="0.4"/>
  </g>

  <!-- Leaf shapes -->
  <ellipse cx="30" cy="100" rx="8" ry="22" transform="rotate(-30 30 100)" fill="#4a6a4a" filter="url(#rb-blur-sm)" opacity="0.2"/>
  <ellipse cx="120" cy="145" rx="7" ry="18" transform="rotate(-15 120 145)" fill="#4a6a4a" filter="url(#rb-blur-sm)" opacity="0.15"/>
  <ellipse cx="180" cy="90" rx="6" ry="15" transform="rotate(20 180 90)" fill="#4a6a4a" filter="url(#rb-blur-sm)" opacity="0.12"/>

  <!-- Gold accent sparkles -->
  <circle cx="100" cy="40" r="2" fill="#e6c9a8" opacity="0.5"/>
  <circle cx="45" cy="85" r="1.5" fill="#d4a373" opacity="0.4"/>
  <circle cx="160" cy="70" r="1.8" fill="#e6c9a8" opacity="0.35"/>
  <circle cx="130" cy="130" r="1.5" fill="#d4a373" opacity="0.3"/>
</svg>
