<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Golden Elegance: Luxury art deco corner with geometric gold patterns -->
  <g opacity="0.9">
    <!-- Main L-shaped frame lines -->
    <path d="M5,5 L5,120" stroke="#d4a843" stroke-width="2" opacity="0.6"/>
    <path d="M5,5 L120,5" stroke="#d4a843" stroke-width="2" opacity="0.6"/>
    <path d="M12,12 L12,100" stroke="#d4a843" stroke-width="1" opacity="0.35"/>
    <path d="M12,12 L100,12" stroke="#d4a843" stroke-width="1" opacity="0.35"/>
    <!-- Art deco fan at corner -->
    <path d="M5,5 L40,5 L5,40 Z" fill="#d4a843" opacity="0.08"/>
    <path d="M5,5 L30,5 L5,30 Z" fill="#d4a843" opacity="0.12"/>
    <path d="M5,5 L20,5 L5,20 Z" fill="#d4a843" opacity="0.18"/>
    <!-- Corner diamond -->
    <path d="M25,25 L35,15 L45,25 L35,35 Z" stroke="#d4a843" stroke-width="1.2" fill="#d4a843" fill-opacity="0.1"/>
    <circle cx="35" cy="25" r="3" fill="#d4a843" opacity="0.4"/>
    <!-- Geometric step pattern on horizontal -->
    <path d="M60,5 L60,15 L75,15 L75,5" stroke="#d4a843" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M80,5 L80,10 L90,10 L90,5" stroke="#d4a843" stroke-width="0.8" fill="none" opacity="0.25"/>
    <path d="M95,5 L95,8 L102,8 L102,5" stroke="#d4a843" stroke-width="0.8" fill="none" opacity="0.2"/>
    <!-- Geometric step pattern on vertical -->
    <path d="M5,60 L15,60 L15,75 L5,75" stroke="#d4a843" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M5,80 L10,80 L10,90 L5,90" stroke="#d4a843" stroke-width="0.8" fill="none" opacity="0.25"/>
    <path d="M5,95 L8,95 L8,102 L5,102" stroke="#d4a843" stroke-width="0.8" fill="none" opacity="0.2"/>
    <!-- Sunburst lines from corner -->
    <line x1="12" y1="12" x2="55" y2="55" stroke="#d4a843" stroke-width="0.4" opacity="0.15"/>
    <line x1="12" y1="12" x2="65" y2="40" stroke="#d4a843" stroke-width="0.4" opacity="0.12"/>
    <line x1="12" y1="12" x2="40" y2="65" stroke="#d4a843" stroke-width="0.4" opacity="0.12"/>
    <!-- End caps -->
    <circle cx="120" cy="5" r="2" fill="#d4a843" opacity="0.3"/>
    <circle cx="5" cy="120" r="2" fill="#d4a843" opacity="0.3"/>
  </g>
</svg>