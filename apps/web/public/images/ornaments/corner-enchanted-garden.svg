<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <!-- Enchanted Garden corner ornament — vine & leaf motif in sage/champagne -->
  <defs>
    <linearGradient id="eg-vine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7d8c6e"/>
      <stop offset="100%" stop-color="#a8b89a"/>
    </linearGradient>
    <linearGradient id="eg-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7d8c6e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6b7a5e" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="eg-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c7956d"/>
      <stop offset="100%" stop-color="#d4a87d"/>
    </linearGradient>
  </defs>

  <!-- Main curving vine from corner -->
  <path d="M0,0 C0,60 20,100 50,140 C70,165 100,190 140,210 C165,222 195,230 230,235 C260,238 290,238 320,235"
        stroke="url(#eg-vine)" stroke-width="2.5" fill="none" opacity="0.7"/>

  <!-- Secondary vine branch -->
  <path d="M0,0 C15,50 40,85 75,115 C100,135 130,150 165,160 C190,167 220,170 250,168"
        stroke="url(#eg-vine)" stroke-width="1.8" fill="none" opacity="0.5"/>

  <!-- Tertiary delicate vine -->
  <path d="M0,0 C10,30 30,55 55,75 C75,90 100,100 130,105"
        stroke="url(#eg-vine)" stroke-width="1.2" fill="none" opacity="0.35"/>

  <!-- Large leaf cluster near origin -->
  <g transform="translate(30,45) rotate(25)">
    <ellipse rx="18" ry="8" fill="url(#eg-leaf)" opacity="0.6"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#6b7a5e" stroke-width="0.6" opacity="0.5"/>
  </g>
  <g transform="translate(20,65) rotate(40)">
    <ellipse rx="14" ry="6" fill="url(#eg-leaf)" opacity="0.5"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#6b7a5e" stroke-width="0.5" opacity="0.4"/>
  </g>
  <g transform="translate(50,30) rotate(10)">
    <ellipse rx="12" ry="5" fill="url(#eg-leaf)" opacity="0.45"/>
  </g>

  <!-- Mid-vine leaves -->
  <g transform="translate(80,120) rotate(35)">
    <ellipse rx="15" ry="6.5" fill="url(#eg-leaf)" opacity="0.55"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#6b7a5e" stroke-width="0.5" opacity="0.4"/>
  </g>
  <g transform="translate(65,135) rotate(50)">
    <ellipse rx="11" ry="5" fill="url(#eg-leaf)" opacity="0.4"/>
  </g>
  <g transform="translate(110,155) rotate(20)">
    <ellipse rx="13" ry="5.5" fill="url(#eg-leaf)" opacity="0.45"/>
  </g>

  <!-- Outer vine leaves -->
  <g transform="translate(155,205) rotate(15)">
    <ellipse rx="14" ry="6" fill="url(#eg-leaf)" opacity="0.4"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#6b7a5e" stroke-width="0.5" opacity="0.35"/>
  </g>
  <g transform="translate(200,225) rotate(5)">
    <ellipse rx="12" ry="5" fill="url(#eg-leaf)" opacity="0.35"/>
  </g>
  <g transform="translate(250,232) rotate(-5)">
    <ellipse rx="10" ry="4.5" fill="url(#eg-leaf)" opacity="0.3"/>
  </g>

  <!-- Small champagne accent berries -->
  <circle cx="42" cy="55" r="3.5" fill="url(#eg-accent)" opacity="0.6"/>
  <circle cx="38" cy="62" r="2.5" fill="url(#eg-accent)" opacity="0.45"/>
  <circle cx="90" cy="130" r="3" fill="url(#eg-accent)" opacity="0.5"/>
  <circle cx="135" cy="170" r="2.5" fill="url(#eg-accent)" opacity="0.4"/>
  <circle cx="175" cy="200" r="2" fill="url(#eg-accent)" opacity="0.35"/>

  <!-- Tiny vine tendrils (curling wisps) -->
  <path d="M45,80 C55,75 58,82 52,88" stroke="url(#eg-vine)" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M100,140 C112,135 115,145 108,150" stroke="url(#eg-vine)" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M160,185 C172,178 176,188 168,194" stroke="url(#eg-vine)" stroke-width="0.7" fill="none" opacity="0.25"/>

  <!-- Decorative small dotted arc near corner -->
  <path d="M5,15 Q15,5 25,8" stroke="#c7956d" stroke-width="0.8" stroke-dasharray="2,3" fill="none" opacity="0.3"/>
  <path d="M8,25 Q5,15 12,8" stroke="#c7956d" stroke-width="0.6" stroke-dasharray="1.5,3" fill="none" opacity="0.25"/>
</svg>
