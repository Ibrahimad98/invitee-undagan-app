<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Floral rose/peony corner with leaves and petals -->
  <g opacity="0.9">
    <!-- Main rose bloom -->
    <circle cx="55" cy="55" r="18" fill="#d4688e" opacity="0.15"/>
    <path d="M55,37 Q62,42 62,55 Q62,42 69,37 Q62,48 55,37" fill="#d4688e" opacity="0.35"/>
    <path d="M55,73 Q62,68 62,55 Q62,68 69,73 Q62,62 55,73" fill="#d4688e" opacity="0.3"/>
    <path d="M37,55 Q42,48 55,48 Q42,48 37,41 Q48,48 37,55" fill="#d4688e" opacity="0.3"/>
    <path d="M73,55 Q68,48 55,48 Q68,48 73,41 Q62,48 73,55" fill="#d4688e" opacity="0.35"/>
    <!-- Inner petals -->
    <circle cx="55" cy="55" r="8" fill="#d4688e" opacity="0.25"/>
    <circle cx="55" cy="55" r="3" fill="#d4688e" opacity="0.5"/>
    <!-- Vine stem going outward -->
    <path d="M73,55 Q95,50 120,55 Q140,58 160,52" stroke="#d4688e" stroke-width="1.2" fill="none" opacity="0.4"/>
    <path d="M55,73 Q50,95 55,120 Q58,140 52,160" stroke="#d4688e" stroke-width="1.2" fill="none" opacity="0.4"/>
    <!-- Leaves on horizontal vine -->
    <path d="M100,52 Q108,42 112,52 Q105,48 100,52 Z" fill="#8b5e6e" opacity="0.3"/>
    <path d="M125,56 Q132,46 136,56 Q129,52 125,56 Z" fill="#8b5e6e" opacity="0.25"/>
    <!-- Leaves on vertical vine -->
    <path d="M52,100 Q42,108 52,112 Q48,105 52,100 Z" fill="#8b5e6e" opacity="0.3"/>
    <path d="M56,130 Q46,137 56,140 Q50,135 56,130 Z" fill="#8b5e6e" opacity="0.25"/>
    <!-- Small buds -->
    <circle cx="148" cy="54" r="4" fill="#d4688e" opacity="0.2"/>
    <circle cx="54" cy="148" r="4" fill="#d4688e" opacity="0.2"/>
    <!-- Corner small petals -->
    <circle cx="20" cy="20" r="6" fill="#d4688e" opacity="0.12"/>
    <path d="M15,10 Q20,15 15,20 Q10,15 15,10 Z" fill="#d4688e" opacity="0.2"/>
    <path d="M10,15 Q15,20 20,15 Q15,10 10,15 Z" fill="#d4688e" opacity="0.2"/>
    <!-- Tiny scattered petals -->
    <circle cx="35" cy="15" r="2.5" fill="#d4688e" opacity="0.15"/>
    <circle cx="15" cy="38" r="2" fill="#d4688e" opacity="0.12"/>
    <circle cx="85" cy="25" r="2" fill="#d4688e" opacity="0.1"/>
    <circle cx="25" cy="85" r="2" fill="#d4688e" opacity="0.1"/>
  </g>
</svg>