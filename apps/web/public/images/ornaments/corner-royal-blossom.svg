<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <!-- Royal Blossom corner ornament — ornate gold botanical for dark theme -->
  <defs>
    <linearGradient id="rb-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a373"/>
      <stop offset="50%" stop-color="#e6c9a8"/>
      <stop offset="100%" stop-color="#c4915f"/>
    </linearGradient>
    <linearGradient id="rb-rose" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4a373" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5e3c" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Primary ornate scroll from corner -->
  <path d="M0,0 C5,40 15,70 35,100 C50,120 75,145 105,165 C130,180 160,192 195,200 C225,206 260,208 295,205"
        stroke="url(#rb-gold)" stroke-width="2" fill="none" opacity="0.65"/>

  <!-- Counter-scroll -->
  <path d="M0,0 C25,25 45,55 60,90 C72,115 80,145 85,175 C88,200 87,225 82,250"
        stroke="url(#rb-gold)" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Delicate inner vine -->
  <path d="M0,0 C8,25 22,45 42,62 C58,76 78,86 102,92"
        stroke="url(#rb-gold)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Large ornate flower near corner -->
  <g transform="translate(55,55)">
    <!-- Outer petals -->
    <ellipse rx="20" ry="8" transform="rotate(0)" fill="url(#rb-gold)" opacity="0.35"/>
    <ellipse rx="20" ry="8" transform="rotate(45)" fill="url(#rb-gold)" opacity="0.3"/>
    <ellipse rx="20" ry="8" transform="rotate(90)" fill="url(#rb-gold)" opacity="0.35"/>
    <ellipse rx="20" ry="8" transform="rotate(135)" fill="url(#rb-gold)" opacity="0.3"/>
    <!-- Inner petals -->
    <ellipse rx="12" ry="5" transform="rotate(22.5)" fill="url(#rb-gold)" opacity="0.25"/>
    <ellipse rx="12" ry="5" transform="rotate(67.5)" fill="url(#rb-gold)" opacity="0.25"/>
    <ellipse rx="12" ry="5" transform="rotate(112.5)" fill="url(#rb-gold)" opacity="0.25"/>
    <ellipse rx="12" ry="5" transform="rotate(157.5)" fill="url(#rb-gold)" opacity="0.25"/>
    <!-- Center -->
    <circle r="5" fill="url(#rb-gold)" opacity="0.5"/>
    <circle r="2.5" fill="#e6c9a8" opacity="0.6"/>
  </g>

  <!-- Medium flower along main vine -->
  <g transform="translate(120,160)">
    <ellipse rx="14" ry="5.5" transform="rotate(0)" fill="url(#rb-gold)" opacity="0.3"/>
    <ellipse rx="14" ry="5.5" transform="rotate(60)" fill="url(#rb-gold)" opacity="0.25"/>
    <ellipse rx="14" ry="5.5" transform="rotate(120)" fill="url(#rb-gold)" opacity="0.3"/>
    <circle r="4" fill="url(#rb-gold)" opacity="0.4"/>
    <circle r="2" fill="#e6c9a8" opacity="0.5"/>
  </g>

  <!-- Small flower cluster -->
  <g transform="translate(200,195)">
    <ellipse rx="10" ry="4" transform="rotate(0)" fill="url(#rb-gold)" opacity="0.25"/>
    <ellipse rx="10" ry="4" transform="rotate(72)" fill="url(#rb-gold)" opacity="0.2"/>
    <ellipse rx="10" ry="4" transform="rotate(144)" fill="url(#rb-gold)" opacity="0.25"/>
    <ellipse rx="10" ry="4" transform="rotate(216)" fill="url(#rb-gold)" opacity="0.2"/>
    <ellipse rx="10" ry="4" transform="rotate(288)" fill="url(#rb-gold)" opacity="0.25"/>
    <circle r="3" fill="url(#rb-gold)" opacity="0.35"/>
  </g>

  <!-- Ornate leaves along vines -->
  <g transform="translate(35,85) rotate(30)">
    <path d="M0,0 Q8,-12 20,-8 Q12,0 20,8 Q8,12 0,0Z" fill="url(#rb-gold)" opacity="0.3"/>
    <line x1="0" y1="0" x2="18" y2="-2" stroke="#c4915f" stroke-width="0.5" opacity="0.3"/>
  </g>
  <g transform="translate(75,130) rotate(20)">
    <path d="M0,0 Q8,-12 20,-8 Q12,0 20,8 Q8,12 0,0Z" fill="url(#rb-gold)" opacity="0.25"/>
    <line x1="0" y1="0" x2="18" y2="-2" stroke="#c4915f" stroke-width="0.5" opacity="0.25"/>
  </g>
  <g transform="translate(155,185) rotate(10)">
    <path d="M0,0 Q6,-10 16,-6 Q10,0 16,6 Q6,10 0,0Z" fill="url(#rb-gold)" opacity="0.2"/>
  </g>
  <g transform="translate(250,200) rotate(-10)">
    <path d="M0,0 Q5,-8 14,-5 Q8,0 14,5 Q5,8 0,0Z" fill="url(#rb-gold)" opacity="0.18"/>
  </g>

  <!-- Side vine leaf on counter-scroll -->
  <g transform="translate(55,120) rotate(55)">
    <path d="M0,0 Q7,-10 16,-6 Q10,0 16,6 Q7,10 0,0Z" fill="url(#rb-gold)" opacity="0.22"/>
  </g>
  <g transform="translate(70,175) rotate(65)">
    <path d="M0,0 Q6,-9 14,-5 Q8,0 14,5 Q6,9 0,0Z" fill="url(#rb-gold)" opacity="0.18"/>
  </g>

  <!-- Gold accent dots -->
  <circle cx="25" cy="30" r="2" fill="#e6c9a8" opacity="0.4"/>
  <circle cx="40" cy="105" r="2.5" fill="#d4a373" opacity="0.35"/>
  <circle cx="95" cy="145" r="2" fill="#e6c9a8" opacity="0.3"/>
  <circle cx="170" cy="195" r="1.8" fill="#d4a373" opacity="0.25"/>
  <circle cx="240" cy="205" r="1.5" fill="#e6c9a8" opacity="0.2"/>

  <!-- Ornamental scrollwork curls -->
  <path d="M15,40 C28,32 32,42 24,48 C18,52 12,46 15,40Z" stroke="url(#rb-gold)" stroke-width="0.7" fill="none" opacity="0.3"/>
  <path d="M90,148 C100,140 106,148 100,155 C94,160 88,154 90,148Z" stroke="url(#rb-gold)" stroke-width="0.6" fill="none" opacity="0.22"/>

  <!-- Fine dotted arcs for elegance -->
  <path d="M8,12 Q18,3 28,10" stroke="#d4a373" stroke-width="0.6" stroke-dasharray="1.5,2.5" fill="none" opacity="0.25"/>
  <path d="M260,202 Q280,195 300,200" stroke="#d4a373" stroke-width="0.5" stroke-dasharray="1.5,3" fill="none" opacity="0.15"/>
</svg>
