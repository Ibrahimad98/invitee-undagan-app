<svg xmlns="http://www.w3.org/2000/svg" width="280" height="380" viewBox="0 0 280 380">
  <defs>
    <radialGradient id="fg1" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0e2016"/>
      <stop offset="100%" stop-color="#0a1a12"/>
    </radialGradient>
    <radialGradient id="fglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fglow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#64dc96" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#64dc96" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="premBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2eb8a8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="380" rx="16" fill="url(#fg1)"/>

  <!-- Subtle vine pattern -->
  <path d="M20,380 C20,280 40,200 80,150 C110,120 140,100 200,80 C230,70 260,65 280,60" fill="none" stroke="#4ecdc4" stroke-width="0.8" opacity="0.12"/>
  <path d="M0,340 C30,260 60,200 100,160 C130,130 170,110 220,95 C245,88 265,85 280,82" fill="none" stroke="#4ecdc4" stroke-width="0.5" opacity="0.08"/>

  <!-- Fern leaf accents -->
  <ellipse cx="45" cy="310" rx="12" ry="4" transform="rotate(-45 45 310)" fill="#4ecdc4" opacity="0.1"/>
  <ellipse cx="75" cy="240" rx="10" ry="3.5" transform="rotate(-30 75 240)" fill="#4ecdc4" opacity="0.08"/>
  <ellipse cx="120" cy="170" rx="10" ry="3" transform="rotate(-15 120 170)" fill="#64dc96" opacity="0.07"/>
  <ellipse cx="180" cy="120" rx="9" ry="3" transform="rotate(-5 180 120)" fill="#4ecdc4" opacity="0.06"/>

  <!-- Firefly glow particles -->
  <circle cx="60" cy="290" r="8" fill="url(#fglow)"/>
  <circle cx="100" cy="200" r="10" fill="url(#fglow2)"/>
  <circle cx="180" cy="140" r="7" fill="url(#fglow)"/>
  <circle cx="220" cy="260" r="9" fill="url(#fglow2)"/>
  <circle cx="140" cy="320" r="6" fill="url(#fglow)"/>
  <circle cx="40" cy="160" r="5" fill="url(#fglow2)"/>
  <circle cx="240" cy="100" r="7" fill="url(#fglow)"/>

  <!-- Tiny sparkle dots -->
  <circle cx="80" cy="260" r="1.5" fill="#a8edea" opacity="0.5"/>
  <circle cx="150" cy="180" r="1.2" fill="#a8edea" opacity="0.4"/>
  <circle cx="200" cy="300" r="1" fill="#a8edea" opacity="0.35"/>
  <circle cx="50" cy="200" r="1.3" fill="#a8edea" opacity="0.3"/>
  <circle cx="230" cy="150" r="1.1" fill="#a8edea" opacity="0.4"/>

  <!-- Center text area -->
  <rect x="30" y="130" width="220" height="140" rx="6" fill="none" stroke="rgba(78,205,196,0.12)" stroke-width="0.5"/>

  <!-- Template name -->
  <text x="140" y="175" text-anchor="middle" fill="#e0f0e8" font-family="Cormorant Garamond, Georgia, serif" font-size="20" font-weight="600" opacity="0.9">Celestial</text>
  <text x="140" y="200" text-anchor="middle" fill="#e0f0e8" font-family="Cormorant Garamond, Georgia, serif" font-size="20" font-weight="600" opacity="0.9">Garden</text>

  <!-- Decorative line -->
  <line x1="100" y1="212" x2="180" y2="212" stroke="#4ecdc4" stroke-width="0.5" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="140" y="232" text-anchor="middle" fill="#4ecdc4" font-family="Cormorant Garamond, Georgia, serif" font-size="10" font-weight="400" letter-spacing="3" opacity="0.6">MYSTICAL FOREST</text>

  <!-- PREMIUM badge -->
  <rect x="95" y="340" width="90" height="22" rx="11" fill="url(#premBadge)" opacity="0.85"/>
  <text x="140" y="355" text-anchor="middle" fill="#0a1a12" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="2">PREMIUM</text>
</svg>
