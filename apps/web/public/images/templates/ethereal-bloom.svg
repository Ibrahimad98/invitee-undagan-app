<svg xmlns="http://www.w3.org/2000/svg" width="280" height="380" viewBox="0 0 280 380">
  <defs>
    <radialGradient id="eb1" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#12102a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="ebglow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8a9d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b8a9d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ebglow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a0a0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d4a0a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ebglow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d5a3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8d5a3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ebPremBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8a9d4"/>
      <stop offset="100%" stop-color="#d4a0a0"/>
    </linearGradient>
    <!-- Mist gradient -->
    <linearGradient id="ebmist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1a1630" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="380" rx="16" fill="url(#eb1)"/>

  <!-- Mist bands -->
  <rect x="0" y="260" width="280" height="60" fill="url(#ebmist)" opacity="0.5"/>
  <rect x="0" y="100" width="280" height="40" fill="url(#ebmist)" opacity="0.3"/>

  <!-- Floating glow particles — lavender -->
  <circle cx="50" cy="80" r="10" fill="url(#ebglow1)"/>
  <circle cx="200" cy="50" r="8" fill="url(#ebglow1)"/>
  <circle cx="130" cy="320" r="12" fill="url(#ebglow1)"/>
  <circle cx="240" cy="200" r="7" fill="url(#ebglow1)"/>

  <!-- Floating glow particles — rose-gold -->
  <circle cx="80" cy="280" r="9" fill="url(#ebglow2)"/>
  <circle cx="220" cy="120" r="11" fill="url(#ebglow2)"/>
  <circle cx="160" cy="60" r="6" fill="url(#ebglow2)"/>

  <!-- Floating glow particles — warm gold -->
  <circle cx="40" cy="180" r="7" fill="url(#ebglow3)"/>
  <circle cx="250" cy="310" r="8" fill="url(#ebglow3)"/>
  <circle cx="110" cy="140" r="5" fill="url(#ebglow3)"/>

  <!-- Tiny sparkle dots -->
  <circle cx="70" cy="100" r="1.2" fill="#e0dce8" opacity="0.6"/>
  <circle cx="180" cy="160" r="1" fill="#e0dce8" opacity="0.45"/>
  <circle cx="100" cy="240" r="1.3" fill="#e0dce8" opacity="0.5"/>
  <circle cx="210" cy="280" r="0.9" fill="#e0dce8" opacity="0.4"/>
  <circle cx="150" cy="350" r="1.1" fill="#e0dce8" opacity="0.35"/>
  <circle cx="60" cy="340" r="0.8" fill="#e0dce8" opacity="0.3"/>
  <circle cx="230" cy="70" r="1" fill="#e0dce8" opacity="0.5"/>

  <!-- Center text area frame -->
  <rect x="30" y="130" width="220" height="140" rx="6" fill="none" stroke="rgba(184,169,212,0.12)" stroke-width="0.5"/>

  <!-- Template name -->
  <text x="140" y="175" text-anchor="middle" fill="#e8e4f0" font-family="Cormorant Garamond, Georgia, serif" font-size="20" font-weight="600" opacity="0.9">Ethereal</text>
  <text x="140" y="200" text-anchor="middle" fill="#e8e4f0" font-family="Cormorant Garamond, Georgia, serif" font-size="20" font-weight="600" opacity="0.9">Bloom</text>

  <!-- Decorative line -->
  <line x1="100" y1="212" x2="180" y2="212" stroke="#b8a9d4" stroke-width="0.5" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="140" y="230" text-anchor="middle" fill="#b8a9d4" font-family="Great Vibes, cursive" font-size="12" opacity="0.6">Three.js Animated</text>
  <text x="140" y="248" text-anchor="middle" fill="#d4a0a0" font-family="sans-serif" font-size="7" letter-spacing="3" opacity="0.5">GPU PARTICLES</text>

  <!-- PREMIUM badge -->
  <rect x="96" y="340" width="88" height="22" rx="11" fill="url(#ebPremBadge)" opacity="0.85"/>
  <text x="140" y="355" text-anchor="middle" fill="#0a0e1a" font-family="sans-serif" font-size="9" font-weight="700" letter-spacing="2">PREMIUM</text>
</svg>
