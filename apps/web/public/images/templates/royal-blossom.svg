<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <!-- Royal Blossom template thumbnail — dark burgundy/rose-gold -->
  <defs>
    <radialGradient id="rb-bg" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#2a1822"/>
      <stop offset="100%" stop-color="#1a0f14"/>
    </radialGradient>
    <linearGradient id="rb-gold-t" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a373"/>
      <stop offset="50%" stop-color="#e6c9a8"/>
      <stop offset="100%" stop-color="#c4915f"/>
    </linearGradient>
  </defs>

  <rect width="400" height="560" fill="url(#rb-bg)"/>

  <!-- Gold border frame -->
  <rect x="10" y="10" width="380" height="540" rx="2" fill="none" stroke="#d4a373" stroke-width="1" opacity="0.3"/>

  <!-- Watercolor-style corner blobs (top-left) -->
  <g opacity="0.15">
    <ellipse cx="50" cy="50" rx="60" ry="50" fill="#d4a373"/>
    <ellipse cx="80" cy="35" rx="40" ry="30" fill="#c47a8a"/>
    <ellipse cx="35" cy="70" rx="35" ry="25" fill="#d4a373"/>
  </g>
  <!-- Bottom-right mirror -->
  <g opacity="0.15" transform="translate(400,560) rotate(180)">
    <ellipse cx="50" cy="50" rx="60" ry="50" fill="#d4a373"/>
    <ellipse cx="80" cy="35" rx="40" ry="30" fill="#c47a8a"/>
    <ellipse cx="35" cy="70" rx="35" ry="25" fill="#d4a373"/>
  </g>

  <!-- Ornate rose-gold circle ornament -->
  <circle cx="200" cy="80" r="20" fill="none" stroke="#d4a373" stroke-width="0.8" opacity="0.3"/>
  <circle cx="200" cy="80" r="12" fill="none" stroke="#d4a373" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="200" cy="72" rx="5" ry="3" fill="#d4a373" opacity="0.25"/>
  <ellipse cx="193" cy="80" rx="5" ry="3" transform="rotate(72 193 80)" fill="#d4a373" opacity="0.2"/>
  <ellipse cx="207" cy="80" rx="5" ry="3" transform="rotate(-72 207 80)" fill="#d4a373" opacity="0.2"/>
  <circle cx="200" cy="80" r="3.5" fill="#d4a373" opacity="0.35"/>

  <!-- UNDANGAN label -->
  <text x="200" y="130" text-anchor="middle" fill="url(#rb-gold-t)" font-family="'Playfair Display', serif" font-size="10" letter-spacing="5" opacity="0.55">UNDANGAN PERNIKAHAN</text>

  <!-- Names in Playfair italic -->
  <text x="200" y="225" text-anchor="middle" fill="url(#rb-gold-t)" font-family="'Playfair Display', serif" font-size="32" font-style="italic">Budi</text>

  <!-- Ampersand with gold gradient lines -->
  <line x1="120" y1="255" x2="175" y2="255" stroke="#d4a373" stroke-width="0.6" opacity="0.3"/>
  <text x="200" y="265" text-anchor="middle" fill="#d4a373" font-family="'Playfair Display', serif" font-size="22" font-style="italic" opacity="0.7">&amp;</text>
  <line x1="225" y1="255" x2="280" y2="255" stroke="#d4a373" stroke-width="0.6" opacity="0.3"/>

  <text x="200" y="330" text-anchor="middle" fill="url(#rb-gold-t)" font-family="'Playfair Display', serif" font-size="32" font-style="italic">Ani</text>

  <!-- Date -->
  <text x="200" y="400" text-anchor="middle" fill="#f2e8e0" font-family="'Playfair Display', serif" font-size="10" letter-spacing="3" opacity="0.45">12 DESEMBER 2025</text>

  <!-- Diamond ornament -->
  <path d="M196,420 L200,414 L204,420 L200,426Z" fill="none" stroke="#d4a373" stroke-width="0.6" opacity="0.25"/>

  <!-- PREMIUM badge -->
  <rect x="150" y="470" width="100" height="24" rx="12" fill="#d4a373" opacity="0.9"/>
  <text x="200" y="486" text-anchor="middle" fill="#1a0f14" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="2">PREMIUM</text>
</svg>
