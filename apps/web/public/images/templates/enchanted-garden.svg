<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <!-- Enchanted Garden template thumbnail — ivory/sage/champagne -->
  <defs>
    <linearGradient id="eg-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#faf6f0"/>
      <stop offset="50%" stop-color="#f0ebe2"/>
      <stop offset="100%" stop-color="#faf6f0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="560" fill="url(#eg-bg)"/>

  <!-- Double border frame -->
  <rect x="12" y="12" width="376" height="536" rx="4" fill="none" stroke="#7d8c6e" stroke-width="1" opacity="0.25"/>
  <rect x="18" y="18" width="364" height="524" rx="3" fill="none" stroke="#7d8c6e" stroke-width="0.6" opacity="0.12"/>

  <!-- Corner vine decorations -->
  <!-- Top-left -->
  <g opacity="0.5">
    <path d="M12,12 C12,50 30,70 55,90 C70,100 90,108 115,112" fill="none" stroke="#7d8c6e" stroke-width="1.5"/>
    <ellipse cx="30" cy="40" rx="10" ry="4" transform="rotate(25 30 40)" fill="#7d8c6e" opacity="0.4"/>
    <ellipse cx="50" cy="60" rx="8" ry="3.5" transform="rotate(35 50 60)" fill="#7d8c6e" opacity="0.35"/>
    <circle cx="35" cy="50" r="2.5" fill="#c7956d" opacity="0.5"/>
  </g>
  <!-- Bottom-right -->
  <g opacity="0.5" transform="translate(400,560) rotate(180)">
    <path d="M12,12 C12,50 30,70 55,90 C70,100 90,108 115,112" fill="none" stroke="#7d8c6e" stroke-width="1.5"/>
    <ellipse cx="30" cy="40" rx="10" ry="4" transform="rotate(25 30 40)" fill="#7d8c6e" opacity="0.4"/>
    <ellipse cx="50" cy="60" rx="8" ry="3.5" transform="rotate(35 50 60)" fill="#7d8c6e" opacity="0.35"/>
    <circle cx="35" cy="50" r="2.5" fill="#c7956d" opacity="0.5"/>
  </g>

  <!-- Vine arch ornament -->
  <path d="M130,100 C130,65 165,50 200,50 C235,50 270,65 270,100" fill="none" stroke="#7d8c6e" stroke-width="1" opacity="0.4"/>
  <ellipse cx="150" cy="75" rx="5" ry="2.5" transform="rotate(-25 150 75)" fill="#7d8c6e" opacity="0.3"/>
  <ellipse cx="250" cy="75" rx="5" ry="2.5" transform="rotate(25 250 75)" fill="#7d8c6e" opacity="0.3"/>
  <circle cx="200" cy="50" r="2" fill="#c7956d" opacity="0.4"/>

  <!-- UNDANGAN label -->
  <text x="200" y="135" text-anchor="middle" fill="#7a7168" font-family="'Cormorant Garamond', serif" font-size="11" letter-spacing="4" opacity="0.65">UNDANGAN PERNIKAHAN</text>

  <!-- Names in script font -->
  <text x="200" y="230" text-anchor="middle" fill="#3a3530" font-family="'Great Vibes', cursive" font-size="42">Budi</text>

  <!-- Ampersand with dividers -->
  <line x1="130" y1="260" x2="175" y2="260" stroke="#7d8c6e" stroke-width="0.6" opacity="0.3"/>
  <text x="200" y="270" text-anchor="middle" fill="#7d8c6e" font-family="'Great Vibes', cursive" font-size="28" opacity="0.7">&amp;</text>
  <line x1="225" y1="260" x2="270" y2="260" stroke="#7d8c6e" stroke-width="0.6" opacity="0.3"/>

  <text x="200" y="335" text-anchor="middle" fill="#3a3530" font-family="'Great Vibes', cursive" font-size="42">Ani</text>

  <!-- Wavy divider -->
  <path d="M140,370 Q170,362 200,370 Q230,378 260,370" fill="none" stroke="#7d8c6e" stroke-width="0.6" opacity="0.3"/>

  <!-- Date placeholder -->
  <text x="200" y="410" text-anchor="middle" fill="#7a7168" font-family="'Cormorant Garamond', serif" font-size="11" letter-spacing="3" opacity="0.6">12 DESEMBER 2025</text>

  <!-- PREMIUM badge -->
  <rect x="150" y="470" width="100" height="24" rx="12" fill="#7d8c6e" opacity="0.9"/>
  <text x="200" y="486" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="2">PREMIUM</text>
</svg>
