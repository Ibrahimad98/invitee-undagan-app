  </defs>
  <rect width="400" height="400" fill="url(#g6)"/>
  <!-- Table setting top view -->
  <circle cx="200" cy="200" r="100" fill="white" opacity="0.5"/>
  <circle cx="200" cy="200" r="95" fill="none" stroke="#d7ccc8" stroke-width="1.5" opacity="0.4"/>
