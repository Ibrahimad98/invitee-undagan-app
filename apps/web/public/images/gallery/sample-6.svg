  <rect x="185" y="175" width="30" height="45" rx="2" fill="#d7ccc8" opacity="0.3"/>
  <!-- Cutlery -->
  <rect x="162" y="165" width="4" height="65" rx="2" fill="#bcaaa4" opacity="0.3"/>
  <rect x="234" y="165" width="4" height="65" rx="2" fill="#bcaaa4" opacity="0.3"/>
  <rect x="240" y="165" width="4" height="65" rx="2" fill="#bcaaa4" opacity="0.3"/>
  <!-- Small flower centerpiece -->
  <circle cx="200" cy="145" r="8" fill="#ef5350" opacity="0.2"/>
  <circle cx="192" cy="150" r="6" fill="#e57373" opacity="0.18"/>
  <circle cx="208" cy="150" r="6" fill="#e57373" opacity="0.18"/>
  <circle cx="200" cy="155" r="5" fill="#ef9a9a" opacity="0.15"/>
