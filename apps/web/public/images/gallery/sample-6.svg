  <line x1="250" y1="160" x2="250" y2="178" stroke="#90a4ae" stroke-width="1" opacity="0.3"/>
  <ellipse cx="250" cy="180" rx="8" ry="3" fill="none" stroke="#90a4ae" stroke-width="1" opacity="0.3"/>
  <!-- Text -->
  <text x="200" y="340" text-anchor="middle" font-family="serif" font-size="16" fill="#4e342e" opacity="0.4">Table Setting</text>
